<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thông báo Chủ sân | Arena Kinetic</title>

    <link href="/css/app.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#191c1d",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "surface": "#f8f9fa",
                        "primary": "#b02f00",
                    },
                    fontFamily: {
                        "headline": ["Epilogue"],
                        "body": ["Inter"],
                        "label": ["Lexend"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<div id="sidebar-placeholder"></div>

<main class="ml-64 min-h-screen relative flex flex-col">
    <header class="sticky top-0 z-40 w-full bg-surface/80 backdrop-blur-xl flex items-center justify-between px-8 h-16 shadow-sm border-b border-slate-200/10 shrink-0">
        <div class="flex items-center gap-2 text-sm font-medium">
            <span class="text-slate-400">Arena Manager</span>
            <span class="text-slate-300">/</span>
            <span class="text-slate-800 font-bold">Thông báo</span>
        </div>
        
        <div class="flex items-center gap-6">
            <button id="btnMarkAllRead" class="text-sm font-bold text-orange-600 hover:text-orange-700 bg-transparent border-none cursor-pointer flex items-center gap-1 transition-all active:scale-95 text-decoration-none">
                <span class="material-symbols-outlined text-[18px]">done_all</span> Đánh dấu tất cả đã đọc
            </button>

            <div class="flex items-center gap-3 pl-6 border-l border-slate-200">
                <div class="text-right">
                    <p id="header-email" class="text-sm font-bold text-on-surface leading-none">...</p>
                </div>
                <div id="header-avatar-wrap" class="w-10 h-10 rounded-full flex items-center justify-center bg-orange-100 text-orange-600 font-bold font-headline overflow-hidden ring-2 ring-orange-500/20">
                    <span id="header-initial">O</span>
                </div>
            </div>
        </div>
    </header>

    <div class="p-8 flex-1 w-full max-w-4xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <div class="w-14 h-14 rounded-2xl bg-orange-100 text-orange-700 flex items-center justify-center shadow-sm">
                <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
            </div>
            <div>
                <h2 class="font-headline tracking-tight font-black text-3xl text-slate-900">Trung tâm thông báo</h2>
                <p class="text-sm text-slate-500 mt-1">Cập nhật các hoạt động mới nhất từ khách hàng và hệ thống.</p>
            </div>
        </div>

        <div id="notif-list" class="flex flex-col gap-3 min-h-[60vh]">
            <div class="flex flex-col items-center justify-center h-40 text-slate-400 mt-10">
                <span class="material-symbols-outlined text-[40px] animate-spin mb-2">sync</span>
                <span class="text-sm font-bold font-body uppercase tracking-widest">Đang tải dữ liệu...</span>
            </div>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/layout_owner.js"></script>
<script src="/js/owner_notifications.js"></script>

</body>
</html>
