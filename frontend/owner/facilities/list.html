<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Quản lý Cơ sở | Arena Kinetic Owner</title>

    <link href="../../css/app.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../../js/tailwind-config.js"></script>
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<div id="sidebar-placeholder"></div>

<main class="ml-64 min-h-screen relative flex flex-col">
    <header class="sticky top-0 z-40 w-full bg-surface/80 backdrop-blur-xl flex items-center justify-between px-8 h-16 shadow-sm border-b border-slate-200/10 shrink-0">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 text-sm font-medium">
                <span class="text-slate-400">Arena Manager</span>
                <span class="text-slate-300">/</span>
                <span class="text-slate-800 font-bold">Danh sách Cơ sở</span>
            </div>
        </div>
        <div class="flex items-center gap-3 pl-6">
            <div class="text-right">
                <p id="header-email" class="text-sm font-bold text-on-surface leading-none">...</p>
            </div>
            <div id="header-avatar-wrap" class="w-10 h-10 rounded-full flex items-center justify-center bg-orange-100 text-orange-600 font-bold overflow-hidden ring-2 ring-orange-500/20">
                <span id="header-initial">O</span>
            </div>
        </div>
    </header>

    <div class="p-8 flex-1">
        <div id="alertToast" class="fixed top-20 right-8 z-50 mb-6 p-4 rounded-xl shadow-lg transition-all duration-500 opacity-0 translate-y-[-20px] hidden" style="min-width: 300px;">
            <div class="flex items-center gap-3">
                <span id="toastIcon" class="material-symbols-outlined"></span>
                <span id="toastText" class="font-bold text-sm"></span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
            <div>
                <h2 class="font-headline font-black text-3xl text-slate-900 tracking-tight">Quản lý Cơ sở</h2>
                <p class="text-slate-500 text-sm mt-1">Xem, tìm kiếm và chỉnh sửa các sân thể thao của bạn.</p>
            </div>

            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-72">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">search</span>
                    <input type="text" id="searchInput" placeholder="Tìm tên sân, địa chỉ..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all outline-none shadow-sm">
                </div>
                <a href="create.html" class="shrink-0 px-5 py-2.5 bg-orange-600 text-white font-bold text-sm rounded-xl flex items-center gap-2 hover:bg-orange-700 hover:shadow-lg transition-all active:scale-95 no-underline">
                    <span class="material-symbols-outlined text-[18px]">add</span>
                    <span class="hidden sm:inline">Thêm cơ sở</span>
                </a>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-slate-100 overflow-hidden flex flex-col">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-slate-50/50 border-b border-slate-100 text-xs uppercase tracking-wider text-slate-500 font-bold font-label">
                            <th class="px-6 py-4">Cơ sở</th>
                            <th class="px-6 py-4">Địa chỉ</th>
                            <th class="px-6 py-4">Liên hệ & Giờ</th>
                            <th class="px-6 py-4 text-center">Trạng thái</th>
                            <th class="px-6 py-4 text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm font-medium text-slate-700 divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>

            <div id="paginationContainer" class="px-6 py-4 border-t border-slate-100 flex items-center justify-between bg-slate-50/30 hidden">
                <span class="text-sm text-slate-500">Đang hiển thị <span id="pageInfo" class="font-bold text-slate-800"></span></span>
                <div class="flex items-center gap-1">
                    <button id="btnPrev" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-200 transition-colors border-none bg-transparent cursor-pointer"><span class="material-symbols-outlined text-[20px]">chevron_left</span></button>
                    <div id="pageNumbers" class="flex gap-1"></div>
                    <button id="btnNext" class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-400 hover:bg-slate-200 transition-colors border-none bg-transparent cursor-pointer"><span class="material-symbols-outlined text-[20px]">chevron_right</span></button>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="deleteModal" class="fixed inset-0 z-[100] hidden items-center justify-center">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
    <div class="bg-white rounded-2xl shadow-2xl z-10 w-full max-w-sm p-6 transform transition-all duration-200 scale-95 opacity-0" id="deleteModalContent">
        <div class="flex flex-col items-center text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4"><span class="material-symbols-outlined text-4xl">warning</span></div>
            <h3 class="text-xl font-headline font-black text-slate-900 mb-2">Xác nhận xóa cơ sở</h3>
            <p class="text-slate-500 text-sm mb-6 leading-relaxed">Bạn có chắc chắn muốn xóa cơ sở <span id="deleteFacilityName" class="font-bold text-slate-900"></span>? Dữ liệu sẽ bị <span class="text-red-600 font-bold">xóa vĩnh viễn</span>.</p>
            <div class="flex w-full gap-3">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl border-none cursor-pointer">Hủy</button>
                <button id="btnConfirmDelete" class="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg transition-all border-none cursor-pointer">Xóa</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/layout_owner.js"></script>
<script src="../../js/owner_facilities.js"></script>
</body>
</html>
