<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Chỉnh sửa dịch vụ đi kèm | Arena Kinetic Owner</title>

    <link href="/css/app.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-surface": "#191c1d",
                        "surface": "#f8f9fa",
                        "primary": "#b02f00"
                    },
                    fontFamily: {
                        "headline": ["Epilogue"],
                        "body": ["Inter"],
                        "label": ["Lexend"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<div id="sidebar-placeholder"></div>

<main class="ml-64 min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 w-full bg-surface/80 backdrop-blur-xl flex items-center justify-between px-8 h-16 shadow-sm border-b border-slate-200/10 shrink-0">
        <div class="flex items-center gap-2 text-sm font-medium">
            <span class="text-slate-400">Arena Manager</span>
            <span class="text-slate-300">/</span>
            <a href="../facilities/list.html" class="text-slate-500 hover:text-orange-600 transition-colors text-decoration-none">Cơ sở</a>
            <span class="text-slate-300">/</span>
            <a id="breadcrumbFacilityLink" href="#" class="text-slate-500 hover:text-orange-600 transition-colors text-decoration-none">Dịch vụ</a>
            <span class="text-slate-300">/</span>
            <span class="text-slate-800 font-bold">Chỉnh sửa</span>
        </div>
        <div class="flex items-center gap-6">
            <a id="btnBackToServices" href="#" class="text-sm text-orange-600 font-bold hover:underline flex items-center gap-1 text-decoration-none">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span> Quay lại danh sách
            </a>
            <div class="flex items-center gap-3 pl-6 border-l border-slate-200">
                <div class="text-right">
                    <p id="header-email" class="text-sm font-bold text-on-surface leading-none">...</p>
                </div>
                <div id="header-avatar-wrap" class="w-10 h-10 rounded-full flex items-center justify-center bg-orange-100 text-orange-600 font-bold font-headline overflow-hidden ring-2 ring-orange-500/20">
                    <span id="header-initial">O</span>
                </div>
            </div>
        </div>
    </header>

    <div class="p-8 flex-1">
        <div id="alertToast" class="mb-6 p-4 rounded-xl shadow-sm transition-all duration-500 opacity-0 hidden max-w-3xl mx-auto">
            <div class="flex items-center gap-3">
                <span id="toastIcon" class="material-symbols-outlined"></span>
                <span id="toastText" class="font-bold text-sm"></span>
            </div>
        </div>

        <div class="max-w-3xl mx-auto bg-white rounded-[1.5rem] border border-slate-100 shadow-sm overflow-hidden relative">
            
            <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center hidden">
                <span class="material-symbols-outlined animate-spin text-4xl text-cyan-600 mb-2">sync</span>
                <span class="text-sm font-bold text-slate-600">Đang tải dữ liệu...</span>
            </div>

            <div class="px-8 py-6 border-b border-slate-100 bg-slate-50/70">
                <p class="text-xs uppercase tracking-widest font-bold text-slate-500 mb-1">Chỉnh sửa dịch vụ</p>
                <h1 id="displayServiceName" class="font-headline text-3xl font-black text-slate-900">Đang tải...</h1>
                <p id="displayFacilityName" class="text-sm text-slate-500 mt-1">Đang tải...</p>
            </div>

            <form id="editServiceForm" class="px-8 py-8 space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Tên dịch vụ *</label>
                    <input type="text" id="svcName" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500" required>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Mô tả</label>
                    <textarea id="svcDesc" rows="4" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500"></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Giá (₫) *</label>
                        <input type="number" id="svcPrice" min="1000" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500 font-bold text-orange-600" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Đơn vị *</label>
                        <input type="text" id="svcUnit" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Tồn kho</label>
                        <input type="number" id="svcStock" min="0" placeholder="∞" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Áp dụng cho (Môn thể thao)</label>
                    <select id="svcSport" class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-cyan-200 focus:border-cyan-500">
                        <option value="">Tất cả loại sân</option>
                    </select>
                </div>

                <label class="flex items-center gap-2 text-sm text-slate-700 font-medium">
                    <input type="checkbox" id="svcActive" class="rounded border-slate-300 text-cyan-600 focus:ring-cyan-400">
                    Dịch vụ đang hoạt động
                </label>

                <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100">
                    <a id="btnCancel" href="#" class="px-5 py-3 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm hover:bg-slate-50 text-decoration-none">Hủy</a>
                    <button type="submit" id="btnSubmitForm" class="px-5 py-3 rounded-xl bg-cyan-600 text-white font-bold text-sm hover:bg-cyan-700 transition-colors flex items-center justify-center gap-2">
                        Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/layout_owner.js"></script>
<script src="/js/owner_service_edit.js"></script>

</body>
</html>
