<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Thêm sân | Arena Kinetic Owner</title>

    <link href="../../css/app.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&family=Lexend:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../../js/tailwind-config.js"></script>
    
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">

<div id="sidebar-placeholder"></div>

<main class="ml-64 min-h-screen">
    <header class="w-full sticky top-0 z-40 bg-white/80 backdrop-blur-xl flex justify-between items-center px-8 py-4 shadow-sm">
        <div class="flex items-center gap-4">
            <a href="list.html" class="p-2 hover:bg-surface-container rounded-full transition-colors group no-underline">
                <span class="material-symbols-outlined text-slate-500 group-hover:text-orange-600 transition-colors">arrow_back</span>
            </a>
            <h2 class="font-headline tracking-tight font-bold text-2xl text-slate-900">Thêm sân mới</h2>
        </div>
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3 pr-2 border-r border-slate-200">
                <div class="text-right">
                    <p id="header-email" class="text-sm font-bold text-on-surface leading-none">...</p>
                </div>
                <div id="header-avatar-wrap" class="w-10 h-10 rounded-full flex items-center justify-center bg-orange-100 text-orange-600 font-bold font-headline overflow-hidden ring-2 ring-orange-500/20">
                    <span id="header-initial">O</span>
                </div>
            </div>
        </div>
    </header>

    <form id="fieldForm">
        <div class="p-8 max-w-6xl mx-auto">
            <div id="alertToast" class="fixed top-20 right-8 z-50 mb-6 p-4 rounded-xl shadow-lg transition-all duration-500 opacity-0 translate-y-[-20px] hidden" style="min-width: 300px;">
                <div class="flex items-center gap-3">
                    <span id="toastIcon" class="material-symbols-outlined"></span>
                    <span id="toastText" class="font-bold text-sm"></span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <section class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-6">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="material-symbols-outlined text-orange-600" style="font-variation-settings: 'FILL' 1;">info</span>
                            <h3 class="text-xl font-bold tracking-tight text-slate-900">Thông tin cơ bản</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="font-label text-sm font-medium text-slate-600">Tên sân bóng</label>
                                <input id="fieldName" type="text" placeholder="VD: Sân A1 - Mỹ Đình" class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-orange-600/20 rounded-lg p-3 text-on-surface placeholder:text-slate-400" required/>
                                <p id="nameError" class="text-xs text-red-600 hidden"></p>
                            </div>
                            <div class="space-y-2">
                                <label class="font-label text-sm font-medium text-slate-600">Loại sân</label>
                                <select id="sportType" class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-orange-600/20 rounded-lg p-3 text-on-surface" required>
                                    <option value="">Chọn loại sân</option>
                                    <option value="FOOTBALL">Bóng đá</option>
                                    <option value="BADMINTON">Cầu lông</option>
                                    <option value="VOLLEYBALL">Bóng chuyền</option>
                                    <option value="BASKETBALL">Bóng rổ</option>
                                </select>
                                <p id="sportError" class="text-xs text-red-600 hidden"></p>
                            </div>
                            <div class="md:col-span-2 space-y-2">
                                <label class="font-label text-sm font-medium text-slate-600">Mô tả ngắn</label>
                                <textarea id="description" placeholder="Mô tả về chất lượng cỏ, kích thước hoặc lưu ý riêng của sân..." rows="3" class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-orange-600/20 rounded-lg p-3 text-on-surface placeholder:text-slate-400"></textarea>
                            </div>
                            <div class="space-y-2">
                                <label class="font-label text-sm font-medium text-slate-600">Bề mặt sân</label>
                                <input id="surfaceType" type="text" placeholder="VD: Cỏ nhân tạo" class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-orange-600/20 rounded-lg p-3 text-on-surface placeholder:text-slate-400"/>
                            </div>
                        </div>
                    </section>

                    <section class="bg-surface-container-lowest p-8 rounded-xl shadow-sm space-y-6">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="material-symbols-outlined text-orange-600" style="font-variation-settings: 'FILL' 1;">payments</span>
                            <h3 class="text-xl font-bold tracking-tight text-slate-900">Giá thuê</h3>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2 relative">
                                <label class="font-label text-sm font-medium text-slate-600">Giá thuê theo giờ</label>
                                <div class="relative">
                                    <input id="pricePerHour" type="number" step="0.01" min="0" placeholder="300000" class="w-full bg-surface-container-highest border-none focus:ring-2 focus:ring-orange-600/20 rounded-lg p-3 text-on-surface pr-16 font-label" required/>
                                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium">VNĐ</span>
                                </div>
                                <p id="priceError" class="text-xs text-red-600 hidden"></p>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="lg:col-span-1 space-y-8">
                    <div class="sticky top-28 space-y-4">
                        <div class="bg-slate-900 p-6 rounded-2xl text-white shadow-xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-4 opacity-10">
                                <span class="material-symbols-outlined text-6xl">verified</span>
                            </div>
                            <h4 class="font-headline font-bold text-lg mb-2">Hoàn tất biểu mẫu</h4>
                            <p class="text-slate-400 text-sm mb-6">Hãy kiểm tra kỹ thông tin trước khi lưu để đảm bảo khách hàng có thông tin chính xác nhất.</p>
                            <div class="space-y-3">
                                <button type="submit" id="btnSubmitForm" class="w-full bg-orange-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-orange-700 transition-all active:scale-95 shadow-lg shadow-orange-600/20 border-none cursor-pointer">
                                    <span class="material-symbols-outlined">save</span>
                                    <span>Lưu thông tin sân</span>
                                </button>
                                <a href="list.html" class="w-full bg-slate-800 text-slate-300 font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-slate-700 transition-all active:scale-95 text-decoration-none">
                                    <span>Hủy bỏ</span>
                                </a>
                            </div>
                        </div>

                        <div class="p-4 bg-blue-50/40 border-l-4 border-blue-500 rounded-lg">
                            <div class="flex gap-3">
                                <span class="material-symbols-outlined text-blue-600">lightbulb</span>
                                <p class="text-xs text-blue-700 leading-relaxed">
                                    <strong>Mẹo:</strong> Sân có thông tin đầy đủ và giá rõ ràng thường có tỷ lệ đặt sân cao hơn.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</main>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/layout_owner.js"></script>
<script src="../../js/owner_fields_form.js"></script>
</body>
</html>
