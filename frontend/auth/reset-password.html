<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu | Arena Kinetic</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,700;0,800;0,900;1,700;1,900&family=Inter:wght@400;500;600&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../css/app.css">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind-config.js"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen font-body">

    <div id="header-placeholder"></div>

    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-screen-2xl mx-auto w-full">
        <div class="max-w-2xl w-full bg-surface-container-lowest rounded-3xl shadow-[0_20px_40px_rgba(25,28,29,0.06)] p-8 sm:p-10 lg:p-12 border border-outline-variant/20">
            <div class="mb-8">
                <h2 class="font-headline font-extrabold text-3xl text-on-surface tracking-tight mb-2">Đặt lại mật khẩu</h2>
                <p class="font-body text-on-surface-variant">Tạo mật khẩu mới để tiếp tục sử dụng tài khoản Arena Kinetic.</p>
            </div>

            <div id="status-error" class="hidden mb-5 p-4 text-sm text-red-800 rounded-lg bg-red-50 border border-red-200" role="alert">
                <span class="font-semibold block mb-1">Không thể đặt lại mật khẩu</span>
                <span id="status-error-text">Liên kết có thể đã hết hạn.</span>
            </div>

            <div id="status-success" class="hidden mb-5 p-4 text-sm text-emerald-800 rounded-lg bg-emerald-50 border border-emerald-200" role="alert">
                <span class="font-semibold block mb-1">Thành công</span>
                <span id="status-success-text">Mật khẩu mới đã được cập nhật. Bạn có thể đăng nhập lại.</span>
            </div>

            <form id="resetPasswordForm" class="space-y-5">
                <div class="space-y-2">
                    <label class="font-label font-semibold text-sm text-on-surface tracking-wide" for="password">MẬT KHẨU MỚI</label>
                    <div class="relative">
                        <input id="password" type="password" required
                               class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-lg px-4 pr-10 py-3.5 text-on-surface placeholder:text-on-surface-variant/50"
                               placeholder="Ít nhất 8 ký tự" />
                        <button type="button" class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-primary transition-colors bg-transparent border-none p-1 cursor-pointer" data-target="password">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="font-label font-semibold text-sm text-on-surface tracking-wide" for="confirmPassword">XÁC NHẬN MẬT KHẨU</label>
                    <div class="relative">
                        <input id="confirmPassword" type="password" required
                               class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-lg px-4 pr-10 py-3.5 text-on-surface placeholder:text-on-surface-variant/50"
                               placeholder="Nhập lại mật khẩu mới" />
                        <button type="button" class="toggle-password absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-primary transition-colors bg-transparent border-none p-1 cursor-pointer" data-target="confirmPassword">
                            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                        </button>
                    </div>
                </div>

                <button id="btnSubmit" type="submit" class="w-full bg-primary text-white font-headline font-bold py-3.5 rounded-xl shadow-lg shadow-primary/30 hover:shadow-xl hover:bg-orange-700 active:scale-[0.98] transition-all border-none cursor-pointer">
                    Cập nhật mật khẩu mới
                </button>
            </form>

            <div class="mt-7 text-sm text-on-surface-variant">
                Đã sẵn sàng đăng nhập?
                <a href="login.html" class="text-primary font-semibold hover:underline ml-1">Đi tới trang đăng nhập</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/api.js"></script>
    <script src="../js/layout.js"></script>

    <script>
        (function () {
            var form = document.getElementById('resetPasswordForm');
            var btnSubmit = document.getElementById('btnSubmit');
            var errorBox = document.getElementById('status-error');
            var errorText = document.getElementById('status-error-text');
            var successBox = document.getElementById('status-success');

            function getResetToken() {
                var searchToken = new URLSearchParams(window.location.search).get('token');
                if (searchToken) return searchToken;

                var pathParts = window.location.pathname.split('/').filter(Boolean);
                var resetIndex = pathParts.indexOf('reset-password');
                if (resetIndex !== -1 && pathParts[resetIndex + 1]) {
                    return pathParts[resetIndex + 1];
                }

                return '';
            }

            function showError(message) {
                successBox.classList.add('hidden');
                errorText.innerText = message || 'Đã có lỗi xảy ra.';
                errorBox.classList.remove('hidden');
            }

            function showSuccess(message) {
                errorBox.classList.add('hidden');
                document.getElementById('status-success-text').innerText = message || 'Mật khẩu đã được đặt lại thành công.';
                successBox.classList.remove('hidden');
            }

            function isStrongPassword(value) {
                var re = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/;
                return re.test(value);
            }

            document.querySelectorAll('.toggle-password').forEach(function (button) {
                button.addEventListener('click', function () {
                    var targetId = this.getAttribute('data-target');
                    var input = document.getElementById(targetId);
                    var icon = this.querySelector('.material-symbols-outlined');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility';
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility_off';
                    }
                });
            });

            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                var token = getResetToken();
                if (!token) {
                    showError('Thiếu token đặt lại mật khẩu. Vui lòng mở lại liên kết trong email.');
                    return;
                }

                var password = document.getElementById('password').value;
                var confirmPassword = document.getElementById('confirmPassword').value;

                if (!isStrongPassword(password)) {
                    showError('Mật khẩu mới phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường, số và ký tự đặc biệt.');
                    return;
                }

                if (password !== confirmPassword) {
                    showError('Mật khẩu xác nhận không khớp.');
                    return;
                }

                btnSubmit.disabled = true;
                btnSubmit.innerText = 'Đang cập nhật...';
                errorBox.classList.add('hidden');
                successBox.classList.add('hidden');

                try {
                    var apiBaseUrl = (typeof BASE_URL !== 'undefined' && BASE_URL) ? BASE_URL : 'http://localhost:3000/api/v1';
                    var response = await fetch(apiBaseUrl + '/auth/reset-password/' + encodeURIComponent(token), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: password })
                    });

                    var result = await response.json();
                    if (response.ok && result.success) {
                        showSuccess(result.message || 'Đặt lại mật khẩu thành công.');
                        form.reset();
                        setTimeout(function () {
                            window.location.href = 'login.html';
                        }, 1400);
                        return;
                    }

                    showError(result.message || 'Token không hợp lệ hoặc đã hết hạn.');
                } catch (error) {
                    showError('Không thể kết nối máy chủ. Vui lòng thử lại sau.');
                } finally {
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = 'Cập nhật mật khẩu mới';
                }
            });
        })();
    </script>
</body>
</html>
