<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo của bạn | Arena Kinetic</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,700;0,800;0,900;1,700;1,900&family=Inter:wght@400;500;600&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./css/app.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="./js/tailwind-config.js"></script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Animation trượt lên mượt mà cho từng thông báo */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .notif-item { animation: slideUpFade 0.4s ease forwards; opacity: 0; }
    </style>
</head>
<body class="bg-slate-50 font-body text-slate-800 antialiased flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <main class="flex-grow pt-28 pb-16 px-4 sm:px-6 w-full">
        <div class="max-w-3xl mx-auto">
            
            <header class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black font-headline tracking-tighter text-slate-900 uppercase italic m-0">Thông báo</h1>
                    <p class="text-slate-500 font-medium mt-2 m-0 text-sm">Cập nhật trạng thái đặt sân và thanh toán của bạn.</p>
                </div>
                <button id="btnMarkAllRead" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-xl hover:bg-slate-50 hover:text-primary transition-colors text-xs font-bold shadow-sm cursor-pointer border-none">
                    <span class="material-symbols-outlined text-[18px]">done_all</span> Đánh dấu tất cả đã đọc
                </button>
            </header>

            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                    <div class="flex gap-2 bg-slate-200/50 p-1 rounded-xl">
                        <button onclick="filterNotifs('ALL', this)" class="tab-btn active bg-white text-slate-800 shadow-sm px-4 py-2 rounded-lg text-xs font-bold transition-all border-none cursor-pointer">
                            Tất cả
                        </button>
                        <button onclick="filterNotifs('UNREAD', this)" class="tab-btn bg-transparent text-slate-500 hover:text-slate-700 px-4 py-2 rounded-lg text-xs font-bold transition-all border-none cursor-pointer flex items-center gap-1">
                            Chưa đọc <span id="unreadCountBadge" class="bg-red-500 text-white px-1.5 py-0.5 rounded-md text-[9px] hidden">0</span>
                        </button>
                    </div>
                    
                    <button id="btnMarkAllReadMobile" class="sm:hidden text-primary hover:text-orange-700 bg-transparent border-none cursor-pointer p-2 flex items-center justify-center rounded-full hover:bg-orange-50 transition-colors" title="Đánh dấu đã đọc">
                        <span class="material-symbols-outlined text-[20px]">done_all</span>
                    </button>
                </div>

                <div id="notificationsContainer" class="min-h-[400px]">
                    <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                        <span class="material-symbols-outlined animate-spin text-[32px] mb-3 text-primary">sync</span>
                        <p class="font-medium text-sm m-0">Đang tải thông báo...</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="./js/api.js"></script>
    <script src="./js/layout.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/auth/login.html';
                return;
            }

            const API_BASE = 'http://localhost:3000/api/v1';
            const container = document.getElementById('notificationsContainer');
            const unreadBadge = document.getElementById('unreadCountBadge');
            const btnMarkAll = document.getElementById('btnMarkAllRead');
            const btnMarkAllMobile = document.getElementById('btnMarkAllReadMobile');

            let allNotifs = [];
            let currentFilter = 'ALL';

            // 1. Fetch dữ liệu từ API
            async function fetchNotifs() {
                try {
                    const res = await fetch(`${API_BASE}/notifications`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const json = await res.json();
                    
                    if (json.success && json.data) {
                        allNotifs = json.data;
                        updateUnreadCount();
                        renderList();
                    } else {
                        showEmptyState("Không thể tải thông báo.");
                    }
                } catch (e) {
                    console.error("Lỗi:", e);
                    showEmptyState("Lỗi kết nối đến máy chủ.");
                }
            }

            // 2. Render danh sách ra UI
            function renderList() {
                const filtered = currentFilter === 'ALL' 
                    ? allNotifs 
                    : allNotifs.filter(n => !n.isRead);

                if (filtered.length === 0) {
                    showEmptyState(currentFilter === 'UNREAD' ? "Bạn không có thông báo nào chưa đọc." : "Bạn chưa có thông báo nào.");
                    return;
                }

                let html = '';
                filtered.forEach((item, index) => {
                    const config = getNotifConfig(item.type);
                    
                    // Format thời gian đẹp mắt (14:30 - 07/04/2026)
                    const d = new Date(item.createdAt);
                    const timeString = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} - ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
                    const timeAgo = timeSince(item.createdAt);

                    const unreadClass = item.isRead ? 'bg-white hover:bg-slate-50 opacity-80' : 'bg-blue-50/40 hover:bg-blue-50/70 border-l-4 border-l-blue-500';
                    const dotHtml = item.isRead ? '' : `<span class="w-2.5 h-2.5 rounded-full bg-blue-500 shrink-0 mt-2 shadow-[0_0_8px_rgba(59,130,246,0.5)]"></span>`;

                    // Tính delay để tạo hiệu ứng trượt xếp tầng (cascade)
                    const delay = index * 0.05;

                    html += `
                    <a href="${item.link || '#'}" onclick="markAsRead('${item._id}', this, event)" class="notif-item flex items-start gap-4 p-5 border-b border-slate-100 transition-all text-decoration-none ${unreadClass}" style="animation-delay: ${delay}s">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${config.bg} ${config.text} shadow-sm border border-white">
                            <span class="material-symbols-outlined text-[24px]">${config.icon}</span>
                        </div>
                        <div class="flex-grow min-w-0">
                            <div class="flex justify-between items-start gap-2 mb-1">
                                <h4 class="text-sm font-bold text-slate-900 m-0 leading-tight">${item.title}</h4>
                                <span class="text-[10px] text-slate-400 font-label tracking-widest uppercase whitespace-nowrap">${timeAgo}</span>
                            </div>
                            <p class="text-sm text-slate-600 m-0 mb-2 leading-relaxed">${item.message}</p>
                            <p class="text-[11px] text-slate-400 font-medium m-0 flex items-center gap-1">
                                <span class="material-symbols-outlined text-[14px]">calendar_today</span> ${timeString}
                            </p>
                        </div>
                        ${dotHtml}
                    </a>`;
                });

                container.innerHTML = html;
            }

            // 3. Logic Tab Lọc (Tất cả / Chưa đọc)
            window.filterNotifs = function(type, btnEl) {
                currentFilter = type;
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.className = 'tab-btn bg-transparent text-slate-500 hover:text-slate-700 px-4 py-2 rounded-lg text-xs font-bold transition-all border-none cursor-pointer flex items-center gap-1';
                });
                btnEl.className = 'tab-btn active bg-white text-slate-800 shadow-sm px-4 py-2 rounded-lg text-xs font-bold transition-all border-none cursor-pointer flex items-center gap-1';
                renderList();
            };

            // 4. Click 1 thông báo để đánh dấu đã đọc
            window.markAsRead = async function(id, el, e) {
                // Nếu backend có API đánh dấu 1 cái đã đọc thì gọi ở đây
                // fetch(`${API_BASE}/notifications/${id}/read`, { method: 'PUT', headers: {...} });
                
                // Mẹo UI: Chuyển màu ngay lập tức cho mượt
                el.classList.remove('bg-blue-50/40', 'border-l-4', 'border-l-blue-500');
                el.classList.add('bg-white', 'opacity-80');
                const dot = el.querySelector('.bg-blue-500.rounded-full');
                if(dot) dot.remove();

                const notif = allNotifs.find(n => n._id === id);
                if (notif) notif.isRead = true;
                updateUnreadCount();
            };

            // 5. Đánh dấu tất cả đã đọc
            async function handleMarkAllRead() {
                try {
                    // CẬP NHẬT: Thay đổi url này theo đúng API backend của ní
                    await fetch(`${API_BASE}/notifications/read-all`, {
                        method: 'PUT', // Hoặc POST tùy backend
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    
                    // Cập nhật mảng local
                    allNotifs.forEach(n => n.isRead = true);
                    updateUnreadCount();
                    renderList();

                    // Xóa số đỏ trên chuông Header
                    const badge = document.getElementById('notifBadge');
                    if(badge) badge.classList.add('hidden');

                } catch (e) { console.error("Lỗi mark all read", e); }
            }

            btnMarkAll.addEventListener('click', handleMarkAllRead);
            btnMarkAllMobile.addEventListener('click', handleMarkAllRead);

            // Các hàm tiện ích
            function updateUnreadCount() {
                const unread = allNotifs.filter(n => !n.isRead).length;
                if (unread > 0) {
                    unreadBadge.innerText = unread > 99 ? '99+' : unread;
                    unreadBadge.classList.remove('hidden');
                } else {
                    unreadBadge.classList.add('hidden');
                }
            }

            function showEmptyState(msg) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 text-center">
                        <div class="w-20 h-20 bg-slate-100 rounded-[1.5rem] flex items-center justify-center mb-6 border border-slate-200">
                            <span class="material-symbols-outlined text-[40px] text-slate-300">notifications_paused</span>
                        </div>
                        <h3 class="text-xl font-black font-headline text-slate-800 uppercase italic mb-2">Trống trơn!</h3>
                        <p class="text-slate-500 text-sm font-medium m-0">${msg}</p>
                    </div>`;
            }

            function getNotifConfig(type) {
                switch(type) {
                    case 'BOOKING_COMPLETED': return { icon: 'task_alt', bg: 'bg-emerald-100', text: 'text-emerald-600' };
                    case 'PAYMENT_SUCCESS': 
                    case 'PAYMENT_RECEIVED': return { icon: 'payments', bg: 'bg-green-100', text: 'text-green-600' };
                    case 'NEW_BOOKING': 
                    case 'BOOKING_CREATED': return { icon: 'event_available', bg: 'bg-amber-100', text: 'text-amber-600' };
                    case 'BOOKING_AUTO_CANCELLED': 
                    case 'BOOKING_AUTO_CANCELLED_OWNER': return { icon: 'event_busy', bg: 'bg-red-100', text: 'text-red-600' };
                    default: return { icon: 'notifications', bg: 'bg-slate-100', text: 'text-slate-600' };
                }
            }

            function timeSince(dateStr) {
                const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);
                let interval = seconds / 86400;
                if (interval > 1) return Math.floor(interval) + " ngày trước";
                interval = seconds / 3600;
                if (interval > 1) return Math.floor(interval) + " giờ trước";
                interval = seconds / 60;
                if (interval > 1) return Math.floor(interval) + " phút trước";
                return "Vừa xong";
            }

            // Khởi chạy
            fetchNotifs();
        });
    </script>
</body>
</html>
